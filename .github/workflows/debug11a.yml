name: Debug Test 11a
on:
  workflow_dispatch:
    inputs:
      count:
        description: how many
        required: true
        default: '5'
      prefix:
        description: name prefix
        required: true
        default: 'zen-proxy'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install huggingface-hub
      - name: step1
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
print('line 1')
print('line 2')
"
